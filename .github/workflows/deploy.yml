name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo '=== REMINDER: Apply pending Supabase migrations BEFORE deploy ==='
            echo '  Check supabase_migrations/ for unapplied .sql files'
            cd /opt/chatbot
            git pull origin main
            docker compose up -d --build
